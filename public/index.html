<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Tracker</title>
<style>
  :root{--bg:#0e0e0e;--card:#1a1a1a;--border:#2c2c2a;--text:#e8e6e0;--muted:#888780;--accent:#2bb3a3;--done:#2bb3a3;--red:#c04040}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:20px 14px 100px;max-width:760px;margin-inline:auto}
  h1{font-size:20px;font-weight:500;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 16px}
  a{color:var(--accent)}

  #gate{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:1000}
  #gate input{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:12px 14px;font-size:16px;text-align:center;width:200px}
  #gate button{background:var(--accent);border:0;color:#04201c;font-weight:600;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer}
  #gate .err{color:var(--red);font-size:13px;min-height:16px}

  .toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .toolbar input[type=date]{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 8px;font-size:13px}

  .task-form{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px}
  .task-form input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 8px;font-size:13px}
  .task-form input[type=text]{flex:1;min-width:140px}
  .task-form button{background:var(--accent);border:0;color:#04201c;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600}

  .reschedule-panel{display:none;gap:6px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-top:0;border-radius:0 0 8px 8px;margin:-5px 0 5px;flex-wrap:wrap;align-items:center}
  .reschedule-panel.open{display:flex}
  .reschedule-panel input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 6px;font-size:12px}
  .reschedule-panel button{border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
  .reschedule-panel .save{background:var(--accent);border:0;color:#04201c;font-weight:600}
  .reschedule-panel .cancel{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tab{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer}
  .tab.active{color:var(--text);border-color:var(--accent)}

  .progress-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
  .stats{display:flex;justify-content:space-between;font-size:13px;color:var(--muted)}
  .progress-bar{height:8px;background:#2c2c2a;border-radius:4px;overflow:hidden;margin-top:8px}
  .progress-fill{height:100%;background:var(--accent);transition:width .3s}

  .day{margin-bottom:18px}
  .day-title{font-size:14px;font-weight:500;margin-bottom:6px;color:var(--muted)}
  .day-title.today{color:var(--accent)}
  .slot{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
  .slot.done{opacity:.5}
  .slot.done .label{text-decoration:line-through}
  .slot.skipped{opacity:.5}
  .slot.skipped .label{text-decoration:line-through;color:var(--red)}
  .time{font-size:11px;color:var(--muted);min-width:80px}
  .label{font-size:13px;flex:1}
  .btn-row{display:flex;gap:4px;flex-shrink:0}
  .ibtn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .ibtn.on.done{background:var(--done);border-color:var(--done);color:#04201c}
  .ibtn.on.skip{background:var(--red);border-color:var(--red);color:#fff}
  .markers{font-size:11px;color:var(--accent);margin-top:2px}
  .slot-err{font-size:11px;color:var(--red);white-space:nowrap}

  .markers-panel{display:none;gap:6px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-top:0;border-radius:0 0 8px 8px;margin:-5px 0 5px;flex-wrap:wrap;align-items:center}
  .markers-panel.open{display:flex}
  .markers-panel input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 6px;font-size:12px;flex:1;min-width:80px}
  .markers-panel button{background:var(--accent);border:0;color:#04201c;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:600}
  .chip{background:var(--bg);border:1px solid var(--accent);color:var(--accent);border-radius:12px;padding:2px 6px 2px 8px;font-size:11px;display:inline-flex;align-items:center;gap:4px}
  .chip .x{cursor:pointer;color:var(--muted);font-weight:700}

  #counter table{width:100%;border-collapse:collapse;font-size:13px}
  #counter td,#counter th{padding:6px 4px;border-bottom:1px solid var(--border);text-align:left}

  #pomo{position:fixed;bottom:14px;right:14px;left:14px;max-width:460px;margin-inline:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:14px;flex-wrap:wrap}
  #pomo .pomo-info{flex:1;min-width:80px}
  #pomo .pomo-phase{font-size:12px;color:var(--accent);font-weight:600}
  #pomo .pomo-task{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
  #pomo .time-display{font-variant-numeric:tabular-nums;font-size:20px;min-width:64px}
  #pomo button{background:var(--accent);border:0;color:#04201c;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:600}
  #pomo button.secondary{background:transparent;border:1px solid var(--border);color:var(--muted)}

  @media (max-width:480px){
    body{padding:14px 8px 110px}
    .time{min-width:64px;font-size:10px}
    .label{font-size:12px}
  }
</style>
</head>
<body>

<div id="gate">
  <h1>Schedule Tracker</h1>
  <input id="passcode-input" type="password" placeholder="passcode" autofocus>
  <button id="gate-submit">Увійти</button>
  <div class="err" id="gate-err"></div>
</div>

<div id="app" style="display:none">
  <h1>Schedule Tracker</h1>
  <p class="sub">Google Calendar — джерело правди</p>

  <div class="toolbar">
    <input type="date" id="from-date">
    <span style="color:var(--muted)">—</span>
    <input type="date" id="to-date">
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="days">Дні</div>
    <div class="tab" data-tab="counter">Лічильник</div>
  </div>

  <div class="progress-wrap">
    <div class="stats"><span id="stat-text">0 / 0 виконано</span><span id="stat-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="task-form">
    <input type="text" id="task-title" placeholder="Нова задача">
    <input type="datetime-local" id="task-start">
    <input type="datetime-local" id="task-end">
    <button id="task-add-submit">Додати</button>
  </div>

  <div id="days"></div>

  <div id="counter" style="display:none">
    <div class="progress-wrap">
      <h3 style="margin-top:0">Живі дані (з поточного sqlite-кешу)</h3>
      <table id="live-table"><thead><tr><th>Статус</th><th>К-сть</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="progress-wrap">
      <h3 style="margin-top:0">Legacy історія (до 2026-07-13)</h3>
      <table id="legacy-table"><thead><tr><th>Статус</th><th>К-сть</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="progress-wrap">
      <h3 style="margin-top:0">Фокус-час по задачах (pomodoro)</h3>
      <table id="focus-table"><thead><tr><th>Задача</th><th>Хв</th><th>Сесій</th></tr></thead><tbody></tbody></table>
    </div>
  </div>
</div>

<div id="pomo" style="display:none">
  <div class="pomo-info">
    <div class="pomo-phase" id="pomo-phase"></div>
    <div class="pomo-task" id="pomo-task"></div>
  </div>
  <div class="time-display" id="pomo-time">25:00</div>
  <button id="pomo-start">Старт</button>
  <button class="secondary" id="pomo-pause" style="display:none">Пауза</button>
  <button class="secondary" id="pomo-resume" style="display:none">Продовжити</button>
  <button class="secondary" id="pomo-skip" style="display:none">⏭</button>
  <button class="secondary" id="pomo-stop" style="display:none">Стоп</button>
</div>

<script>
const API = '/schedule-tracker-api';
const DEFAULT_FROM = '2026-07-02';
const DEFAULT_TO = '2026-08-31';
const RANGE_KEY = 'st_range_v1';
const PASS_KEY = 'st_passcode';

function apiFetch(path, opts={}){
  const passcode = sessionStorage.getItem(PASS_KEY) || '';
  opts.headers = Object.assign({'x-passcode': passcode, 'Content-Type':'application/json'}, opts.headers||{});
  return fetch(API+path, opts);
}

// ---- passcode gate ----
async function tryPasscode(code){
  sessionStorage.setItem(PASS_KEY, code);
  const r = await apiFetch('/counter');
  if(r.status === 401){ sessionStorage.removeItem(PASS_KEY); return false; }
  return true;
}

document.getElementById('gate-submit').onclick = async () => {
  const code = document.getElementById('passcode-input').value;
  const ok = await tryPasscode(code);
  if(ok){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = '';
    document.getElementById('pomo').style.display = 'flex';
    init();
  } else {
    document.getElementById('gate-err').textContent = 'Невірний код';
  }
};
document.getElementById('passcode-input').addEventListener('keydown', e=>{
  if(e.key === 'Enter') document.getElementById('gate-submit').click();
});

(async function boot(){
  const cached = sessionStorage.getItem(PASS_KEY);
  if(cached !== null && await tryPasscode(cached)){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = '';
    document.getElementById('pomo').style.display = 'flex';
    init();
  }
})();

// ---- main app ----
let calEvents = {};
let lastCalHash = null;
const slotIndex = {}; // `${uid}|${start}` -> { ev, slotEl, doneBtn, skipBtn }

function loadRange(){
  try{ return JSON.parse(localStorage.getItem(RANGE_KEY)) || { from: DEFAULT_FROM, to: DEFAULT_TO }; }
  catch(e){ return { from: DEFAULT_FROM, to: DEFAULT_TO }; }
}
function saveRange(r){ localStorage.setItem(RANGE_KEY, JSON.stringify(r)); }

function fmtDay(d){ return d.toLocaleDateString('uk-UA',{weekday:'short',day:'2-digit',month:'2-digit'}); }
function fmtTime(iso){ return new Date(iso).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Kiev'}); }
function slotKey(uid, start){ return uid + '|' + start; }

// ---- Europe/Kiev <-> naive datetime-local conversion (server stores/reads everything in Kyiv wall-clock terms) ----
const kyivDateFmt = new Intl.DateTimeFormat('en-CA', { timeZone:'Europe/Kiev', year:'numeric', month:'2-digit', day:'2-digit' });
const kyivTimeFmt = new Intl.DateTimeFormat('en-GB', { timeZone:'Europe/Kiev', hour:'2-digit', minute:'2-digit', hour12:false });

function isoToKyivLocal(iso){
  const d = new Date(iso);
  return `${kyivDateFmt.format(d)}T${kyivTimeFmt.format(d)}`;
}
function getTZOffsetMinutes(date, timeZone){
  const dtf = new Intl.DateTimeFormat('en-US', { timeZone, hour12:false, year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit' });
  const p = dtf.formatToParts(date).reduce((acc,x)=>{acc[x.type]=x.value;return acc;},{});
  const asUTC = Date.UTC(p.year, p.month-1, p.day, p.hour==='24'?0:p.hour, p.minute, p.second);
  return (asUTC - date.getTime())/60000;
}
function kyivLocalToISO(localValue){
  const guessUtc = new Date(localValue + ':00Z');
  const offsetMin = getTZOffsetMinutes(guessUtc, 'Europe/Kiev');
  return new Date(guessUtc.getTime() - offsetMin*60000).toISOString();
}

// ---- optimistic local mutations for add/delete/reschedule — the public iCal feed Google exposes
// lags real-time writes by more than our own icalCache TTL, so we don't wait on a refetch to reflect them ----
function insertLocalEvent({ uid, start, end, title }){
  const startD = new Date(start), endD = new Date(end);
  const dateKey = kyivDateFmt.format(startD);
  const [sh,sm] = kyivTimeFmt.format(startD).split(':').map(Number);
  const [eh,em] = kyivTimeFmt.format(endD).split(':').map(Number);
  const ev = { uid, start, end, startMin: sh*60+sm, endMin: eh*60+em, title, status:'pending', description:'' };
  (calEvents[dateKey] = calEvents[dateKey] || []).push(ev);
  lastCalHash = JSON.stringify(calEvents);
  render();
}
function removeLocalEvent(uid, start){
  for(const dateKey in calEvents){
    const idx = calEvents[dateKey].findIndex(e=>e.uid===uid && e.start===start);
    if(idx !== -1){
      calEvents[dateKey].splice(idx,1);
      if(!calEvents[dateKey].length) delete calEvents[dateKey];
      break;
    }
  }
  lastCalHash = JSON.stringify(calEvents);
  render();
}
function updateLocalEventTime(uid, oldStart, newStartISO, newEndISO){
  let found = null;
  for(const dateKey in calEvents){
    const idx = calEvents[dateKey].findIndex(e=>e.uid===uid && e.start===oldStart);
    if(idx !== -1){ found = calEvents[dateKey].splice(idx,1)[0]; if(!calEvents[dateKey].length) delete calEvents[dateKey]; break; }
  }
  if(!found) return;
  found.start = newStartISO; found.end = newEndISO;
  const startD = new Date(newStartISO), endD = new Date(newEndISO);
  const dateKey = kyivDateFmt.format(startD);
  const [sh,sm] = kyivTimeFmt.format(startD).split(':').map(Number);
  const [eh,em] = kyivTimeFmt.format(endD).split(':').map(Number);
  found.startMin = sh*60+sm; found.endMin = eh*60+em;
  (calEvents[dateKey] = calEvents[dateKey] || []).push(found);
  lastCalHash = JSON.stringify(calEvents);
  render();
}

async function deleteTaskUI(uid, start, title){
  if(!confirm(`Видалити "${title}"?`)) return;
  const r = await apiFetch(`/task/${encodeURIComponent(uid)}?start=${encodeURIComponent(start)}`, { method:'DELETE' });
  if(!r.ok){ alert('Не вдалося видалити'); return; }
  removeLocalEvent(uid, start);
}

async function saveReschedule(uid, oldStart, startLocal, endLocal){
  const newStart = kyivLocalToISO(startLocal);
  const newEnd = kyivLocalToISO(endLocal);
  const r = await apiFetch(`/task/${encodeURIComponent(uid)}`, { method:'PATCH', body: JSON.stringify({ start: oldStart, newStart, newEnd }) });
  if(!r.ok){ alert('Не вдалося перенести'); return; }
  updateLocalEventTime(uid, oldStart, newStart, newEnd);
}

document.getElementById('task-add-submit').onclick = async () => {
  const titleInput = document.getElementById('task-title');
  const startInput = document.getElementById('task-start');
  const endInput = document.getElementById('task-end');
  const title = titleInput.value.trim();
  if(!title || !startInput.value || !endInput.value) return;
  const startISO = kyivLocalToISO(startInput.value);
  const endISO = kyivLocalToISO(endInput.value);
  const r = await apiFetch('/task', { method:'POST', body: JSON.stringify({ title, start: startISO, end: endISO }) });
  if(!r.ok){ alert('Не вдалося додати задачу'); return; }
  const { iCalUID } = await r.json();
  insertLocalEvent({ uid: iCalUID, start: startISO, end: endISO, title });
  titleInput.value = ''; startInput.value = ''; endInput.value = '';
};

async function loadCalendar(){
  const { from, to } = loadRange();
  const r = await apiFetch(`/calendar?from=${from}&to=${to}`);
  if(!r.ok) return;
  const data = await r.json();
  const hash = JSON.stringify(data);
  if(hash === lastCalHash) return; // server state matches what's already on screen — skip DOM rebuild
  lastCalHash = hash;
  calEvents = data;
  render();
}

function applySlotVisual(entry){
  const { ev, slotEl, doneBtn, skipBtn } = entry;
  slotEl.className = 'slot' + (ev.status==='done'?' done':'') + (ev.status==='skipped'?' skipped':'');
  doneBtn.className = 'ibtn' + (ev.status==='done' ? ' on done' : '');
  skipBtn.className = 'ibtn' + (ev.status==='skipped' ? ' on skip' : '');
}

function updateStats(){
  let total = 0, done = 0;
  for(const dateKey in calEvents){
    for(const ev of calEvents[dateKey]){
      total++;
      if(ev.status === 'done') done++;
    }
  }
  document.getElementById('stat-text').textContent = `${done} / ${total} виконано`;
  document.getElementById('stat-pct').textContent = total ? Math.round(done/total*100)+'%' : '0%';
  document.getElementById('progress-fill').style.width = (total ? done/total*100 : 0)+'%';
}

function showSlotError(slotEl){
  let err = slotEl.querySelector('.slot-err');
  if(!err){
    err = document.createElement('div');
    err.className = 'slot-err';
    slotEl.appendChild(err);
  }
  err.textContent = 'помилка';
  clearTimeout(err._t);
  err._t = setTimeout(() => err.remove(), 3000);
}

async function setStatus(uid, start, newStatus, entry){
  const { ev } = entry;
  const prevStatus = ev.status;
  ev.status = newStatus;
  applySlotVisual(entry);
  updateStats();
  lastCalHash = JSON.stringify(calEvents);
  try {
    const r = await apiFetch('/status', { method:'POST', body: JSON.stringify({ uid, start, status: newStatus }) });
    if(!r.ok) throw new Error('request failed');
  } catch(e) {
    ev.status = prevStatus;
    applySlotVisual(entry);
    updateStats();
    lastCalHash = JSON.stringify(calEvents);
    showSlotError(entry.slotEl);
  }
}

function render(){
  const container = document.getElementById('days');
  container.innerHTML = '';
  for(const k in slotIndex) delete slotIndex[k];
  const today = new Date().toISOString().slice(0,10);

  const dates = Object.keys(calEvents).sort();
  for(const dateKey of dates){
    const slots = calEvents[dateKey].slice().sort((a,b)=>a.startMin-b.startMin);
    const dayDiv = document.createElement('div');
    dayDiv.className = 'day';
    const title = document.createElement('div');
    title.className = 'day-title' + (dateKey===today ? ' today' : '');
    title.textContent = fmtDay(new Date(dateKey+'T00:00:00'));
    dayDiv.appendChild(title);

    slots.forEach(ev => {
      const slotEl = document.createElement('div');
      const timeEl = document.createElement('div'); timeEl.className='time';
      timeEl.textContent = fmtTime(ev.start) + '–' + fmtTime(ev.end);
      const labelEl = document.createElement('div'); labelEl.className='label';
      const titleSpan = document.createElement('div'); titleSpan.textContent = ev.title;
      const markersSpan = document.createElement('div'); markersSpan.className = 'markers';
      markersSpan.textContent = (ev.markers && ev.markers.length) ? ev.markers.join(' · ') : '';
      labelEl.append(titleSpan, markersSpan);
      const btnRow = document.createElement('div'); btnRow.className='btn-row';

      const doneBtn = document.createElement('button');
      doneBtn.textContent = '✓';

      const skipBtn = document.createElement('button');
      skipBtn.textContent = '✕';

      const pomoBtn = document.createElement('button');
      pomoBtn.className = 'ibtn';
      pomoBtn.textContent = '⏱';
      pomoBtn.onclick = () => startPomodoro(ev.uid);

      const rescheduleBtn = document.createElement('button');
      rescheduleBtn.className = 'ibtn';
      rescheduleBtn.textContent = '🕓';

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'ibtn';
      deleteBtn.textContent = '🗑';

      const markerBtn = document.createElement('button');
      markerBtn.className = 'ibtn';
      markerBtn.textContent = '🏷';

      btnRow.append(doneBtn, skipBtn, pomoBtn, rescheduleBtn, markerBtn, deleteBtn);
      slotEl.append(timeEl, labelEl, btnRow);
      dayDiv.appendChild(slotEl);

      const panel = document.createElement('div');
      panel.className = 'reschedule-panel';
      const startInput = document.createElement('input'); startInput.type = 'datetime-local';
      startInput.value = isoToKyivLocal(ev.start);
      const endInput = document.createElement('input'); endInput.type = 'datetime-local';
      endInput.value = isoToKyivLocal(ev.end);
      const saveBtn = document.createElement('button'); saveBtn.className = 'save'; saveBtn.textContent = 'Зберегти';
      const cancelBtn = document.createElement('button'); cancelBtn.className = 'cancel'; cancelBtn.textContent = 'Скасувати';
      panel.append(startInput, endInput, saveBtn, cancelBtn);
      dayDiv.appendChild(panel);

      rescheduleBtn.onclick = () => panel.classList.toggle('open');
      cancelBtn.onclick = () => panel.classList.remove('open');
      saveBtn.onclick = () => saveReschedule(ev.uid, ev.start, startInput.value, endInput.value);
      deleteBtn.onclick = () => deleteTaskUI(ev.uid, ev.start, ev.title);

      const markersPanel = document.createElement('div');
      markersPanel.className = 'markers-panel';
      const tagInput = document.createElement('input'); tagInput.type = 'text'; tagInput.placeholder = 'новий тег';
      const addTagBtn = document.createElement('button'); addTagBtn.textContent = '+';
      function renderChips(){
        markersPanel.querySelectorAll('.chip').forEach(c => c.remove());
        (ev.markers || []).forEach(tag => {
          const chip = document.createElement('span'); chip.className = 'chip';
          const txt = document.createElement('span'); txt.textContent = tag;
          const x = document.createElement('span'); x.className = 'x'; x.textContent = '×';
          x.onclick = () => saveMarkers((ev.markers || []).filter(t => t !== tag));
          chip.append(txt, x);
          markersPanel.insertBefore(chip, tagInput);
        });
      }
      async function saveMarkers(newMarkers){
        const r = await apiFetch('/markers', { method:'POST', body: JSON.stringify({ uid: ev.uid, start: ev.start, markers: newMarkers }) });
        if(!r.ok){ alert('Не вдалося зберегти теги'); return; }
        ev.markers = newMarkers;
        markersSpan.textContent = newMarkers.length ? newMarkers.join(' · ') : '';
        lastCalHash = JSON.stringify(calEvents);
        renderChips();
      }
      addTagBtn.onclick = () => {
        const v = tagInput.value.trim();
        if(!v) return;
        saveMarkers([...(ev.markers || []), v]);
        tagInput.value = '';
      };
      tagInput.addEventListener('keydown', e => { if(e.key === 'Enter') addTagBtn.click(); });
      markersPanel.append(tagInput, addTagBtn);
      renderChips();
      markerBtn.onclick = () => markersPanel.classList.toggle('open');
      dayDiv.appendChild(markersPanel);

      const entry = { ev, slotEl, doneBtn, skipBtn };
      slotIndex[slotKey(ev.uid, ev.start)] = entry;
      applySlotVisual(entry);
      doneBtn.onclick = () => setStatus(ev.uid, ev.start, ev.status==='done' ? 'pending' : 'done', entry);
      skipBtn.onclick = () => setStatus(ev.uid, ev.start, ev.status==='skipped' ? 'pending' : 'skipped', entry);
    });
    container.appendChild(dayDiv);
  }

  updateStats();
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function findEventByUid(uid){
  for(const dateKey in calEvents){
    const ev = calEvents[dateKey].find(e=>e.uid===uid);
    if(ev) return ev;
  }
  return null;
}

async function loadCounter(){
  const { from, to } = loadRange();
  const r = await apiFetch(`/counter?from=${from}&to=${to}`);
  const data = await r.json();
  const liveBody = document.querySelector('#live-table tbody');
  liveBody.innerHTML = data.live.map(row => `<tr><td>${row.status}</td><td>${row.n}</td></tr>`).join('') || '<tr><td colspan=2>—</td></tr>';
  const legacyBody = document.querySelector('#legacy-table tbody');
  legacyBody.innerHTML = data.legacy.map(row => `<tr><td>${row.status}</td><td>${row.n}</td></tr>`).join('') || '<tr><td colspan=2>—</td></tr>';

  const fr = await apiFetch(`/pomodoro/focus-summary?from=${from}&to=${to}`);
  const focusRows = await fr.json();
  const focusBody = document.querySelector('#focus-table tbody');
  focusBody.innerHTML = focusRows.map(row => {
    const ev = findEventByUid(row.eventId);
    const title = escapeHtml(ev ? ev.title : row.eventId);
    return `<tr><td>${title}</td><td>${Math.round(row.totalSec/60)}</td><td>${row.sessions}</td></tr>`;
  }).join('') || '<tr><td colspan=3>—</td></tr>';
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const isCounter = tab.dataset.tab === 'counter';
    document.getElementById('days').style.display = isCounter ? 'none' : '';
    document.querySelector('.progress-wrap').style.display = isCounter ? 'none' : '';
    document.getElementById('counter').style.display = isCounter ? '' : 'none';
    if(isCounter) loadCounter();
  };
});

document.getElementById('from-date').onchange = e => { const r=loadRange(); r.from=e.target.value; saveRange(r); loadCalendar(); };
document.getElementById('to-date').onchange = e => { const r=loadRange(); r.to=e.target.value; saveRange(r); loadCalendar(); };

// ---- pomodoro ----
let pomoActive = { active:false };
let phaseEndsAt = null; // wall-clock ms epoch — avoids drift vs a locally-decremented counter
let pomoTickId = null;
const PUSH_ASKED_KEY = 'st_push_asked';

function updatePomoDisplay(){
  const startBtn = document.getElementById('pomo-start');
  const pauseBtn = document.getElementById('pomo-pause');
  const resumeBtn = document.getElementById('pomo-resume');
  const skipBtn = document.getElementById('pomo-skip');
  const stopBtn = document.getElementById('pomo-stop');
  const phaseEl = document.getElementById('pomo-phase');
  const taskEl = document.getElementById('pomo-task');

  if(!pomoActive || !pomoActive.active){
    document.getElementById('pomo-time').textContent = '25:00';
    phaseEl.textContent = '';
    taskEl.textContent = '';
    startBtn.style.display = '';
    pauseBtn.style.display = 'none';
    resumeBtn.style.display = 'none';
    skipBtn.style.display = 'none';
    stopBtn.style.display = 'none';
    return;
  }

  const remaining = pomoActive.paused
    ? pomoActive.remainingSec
    : Math.max(0, Math.round((phaseEndsAt - Date.now())/1000));
  const m = Math.floor(remaining/60).toString().padStart(2,'0');
  const s = (remaining%60).toString().padStart(2,'0');
  document.getElementById('pomo-time').textContent = `${m}:${s}`;
  phaseEl.textContent = pomoActive.phaseLabel + (pomoActive.phase==='work' ? ` (${pomoActive.cycleCount}/4)` : '');
  const taskEv = pomoActive.eventId ? findEventByUid(pomoActive.eventId) : null;
  taskEl.textContent = taskEv ? taskEv.title : (pomoActive.eventId ? '' : 'Загальний фокус');

  startBtn.style.display = 'none';
  pauseBtn.style.display = pomoActive.paused ? 'none' : '';
  resumeBtn.style.display = pomoActive.paused ? '' : 'none';
  skipBtn.style.display = '';
  stopBtn.style.display = '';
}

function scheduleTick(){
  clearInterval(pomoTickId);
  pomoTickId = setInterval(() => {
    updatePomoDisplay();
    if(pomoActive.active && !pomoActive.paused && Date.now() >= phaseEndsAt){
      refreshPomoState(); // server already advanced phase + sent push; pull the new state
    }
  }, 1000);
}

async function refreshPomoState(){
  const r = await apiFetch('/pomodoro/active');
  pomoActive = await r.json();
  if(pomoActive.active && !pomoActive.paused) phaseEndsAt = Date.now() + pomoActive.remainingSec*1000;
  updatePomoDisplay();
}

function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

async function maybeRequestPushPermission(){
  if(sessionStorage.getItem(PUSH_ASKED_KEY)) return;
  sessionStorage.setItem(PUSH_ASKED_KEY, '1');
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try{
    const perm = await Notification.requestPermission();
    if(perm !== 'granted') return;
    const reg = await navigator.serviceWorker.register('sw.js');
    const r = await apiFetch('/push/vapid-public-key');
    const { key } = await r.json();
    if(!key) return;
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(key) });
    await apiFetch('/push/subscribe', { method:'POST', body: JSON.stringify({ subscription: sub.toJSON() }) });
  }catch(e){ /* denied or unsupported — pomodoro still works locally without push */ }
}

async function startPomodoro(uid){
  if(pomoActive.active) return;
  maybeRequestPushPermission();
  const r = await apiFetch('/pomodoro/start', { method:'POST', body: JSON.stringify({ uid: uid||null }) });
  pomoActive = await r.json();
  if(pomoActive.active) phaseEndsAt = Date.now() + pomoActive.remainingSec*1000;
  updatePomoDisplay();
  scheduleTick();
}
async function stopPomodoro(){
  await apiFetch('/pomodoro/stop', { method:'POST', body: JSON.stringify({ completed:false }) });
  pomoActive = { active:false };
  updatePomoDisplay();
}
async function pausePomodoro(){
  const r = await apiFetch('/pomodoro/pause', { method:'POST' });
  pomoActive = await r.json();
  updatePomoDisplay();
}
async function resumePomodoro(){
  const r = await apiFetch('/pomodoro/resume', { method:'POST' });
  pomoActive = await r.json();
  if(pomoActive.active) phaseEndsAt = Date.now() + pomoActive.remainingSec*1000;
  updatePomoDisplay();
}
async function skipPomodoro(){
  const r = await apiFetch('/pomodoro/skip', { method:'POST' });
  pomoActive = await r.json();
  if(pomoActive.active) phaseEndsAt = Date.now() + pomoActive.remainingSec*1000;
  updatePomoDisplay();
}

document.getElementById('pomo-start').onclick = () => startPomodoro(null);
document.getElementById('pomo-stop').onclick = () => stopPomodoro();
document.getElementById('pomo-pause').onclick = () => pausePomodoro();
document.getElementById('pomo-resume').onclick = () => resumePomodoro();
document.getElementById('pomo-skip').onclick = () => skipPomodoro();

async function init(){
  const { from, to } = loadRange();
  document.getElementById('from-date').value = from;
  document.getElementById('to-date').value = to;
  await loadCalendar();
  await refreshPomoState(); // restores an in-progress cycle across page reloads / service restarts
  scheduleTick();
  setInterval(loadCalendar, 30000);
}
</script>
